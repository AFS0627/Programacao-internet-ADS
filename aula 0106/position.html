<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        #container{
            height:400px;
            width:400px;
            border: 5px solid black;
            position: relative;
        }
       #container>*{
            display: block;
            border: 3px solid black;
            width: 200px;
            height: 100px;
        
        }
        #box1{position: relative;
        left: 200px;
        }
        #box2{
            position: fixed;
          
            left: 0px;
            bottom:0px;
            background-color: gray;
        }
        #box3{
            position: absolute;

        }
    </style>
    <title>Document</title>
</head>
<body>
    <div>
        <h1>Positions</h1>
    </div>
    <div id="container">
        <div id="box1">box1</div>
        <div id="box2">box2</div>
        <div id="box3">box3</div>
        <div id="box4">box4</div>
        <div id="box5">box5</div>
    </div>
</body>
</html>
