<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>5.html</title>
</head>

<body>

<h2>Números Primos</h2>

Início:
<input type="number" id="inicio">

Fim:
<input type="number" id="fim">

<button onclick="verificar()">Verificar</button>

<div id="resultadoPrimos"></div>

<script>

function verificar(){

let inicio = Number(document.getElementById("inicio").value);
let fim = Number(document.getElementById("fim").value);

let resultado = "";

for(let i=inicio;i<=fim;i++){

let primo = true;

if(i < 2){
primo = false;
}

for(let j=2;j<i;j++){
if(i % j == 0){
primo = false;
break;
}
}

if(primo){
resultado += i + " ";
}

}

document.getElementById("resultadoPrimos").innerText = "Primos encontrados: " + resultado;

}

</script>

</body>
</html>
