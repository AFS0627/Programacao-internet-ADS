<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>10.html</title>
</head>

<body>

<button id="alertButton">Clique aqui</button>

<input type="text" id="textInput" placeholder="Digite algo">

<div id="hoverDiv" style="width:200px;height:100px;border:1px solid black;">
Passe o mouse aqui
</div>

<select id="colorSelect">
<option value="">Escolha uma cor</option>
<option value="blue">Azul</option>
<option value="green">Verde</option>
<option value="red">Vermelho</option>
</select>

<script>

let botao = document.getElementById("alertButton");
let texto = document.getElementById("textInput");
let div = document.getElementById("hoverDiv");
let select = document.getElementById("colorSelect");

botao.addEventListener("click",function(){
alert("Botão clicado!");
});

texto.addEventListener("keydown",function(event){
console.log(event.key);
});

texto.addEventListener("focus",function(){
texto.style.backgroundColor = "yellow";
});

texto.addEventListener("blur",function(){
texto.style.backgroundColor = "white";
});

div.addEventListener("mouseover",function(){
div.style.backgroundColor = "lightblue";
});

div.addEventListener("mouseout",function(){
div.style.backgroundColor = "white";
});

select.addEventListener("change",function(){
document.body.style.backgroundColor = select.value;
});

</script>

</body>
</html>
