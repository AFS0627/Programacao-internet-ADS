<button onclick="mostrar()">Mostrar</button>

<br>

<p id="op1"></p>
<p id="op2"></p>
<p id="op3"></p>
<p id="op4"></p>

<script>

function mostrar(){

let texto="Olá";
let numero=10;
let bool=true;
let x;
let nulo=null;
let obj={nome:"Arthur"};
let vetor=[1,2,3];

document.getElementById("pstring").innerHTML="String: "+typeof texto;
