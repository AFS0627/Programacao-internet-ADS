<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>8.html</title>

<style>

body{
display:flex;
justify-content:center;
margin-top:50px;
}

.caixa{
width:140px;
height:100px;
display:flex;
justify-content:center;
align-items:flex-end;
padding-bottom:5px;
font-size:25px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="caixa"></div>
<div class="caixa"></div>
<div class="caixa"></div>
<div class="caixa"></div>
<div class="caixa"></div>

<script>

let divs = document.querySelectorAll(".caixa");

function gerarCor(){

let letras="0123456789ABCDEF";
let cor="#";

for(let i=0;i<6;i++){
cor=cor+letras[Math.floor(Math.random()*16)];
}

return cor;

}

function mudar(){

for(let i=0;i<divs.length;i++){

let c=gerarCor();

divs[i].style.backgroundColor=c;
divs[i].innerHTML=c;

}

}

mudar();

document.addEventListener("keydown",function(e){

if(e.code=="Space"){

e.preventDefault();
mudar();

}

});

</script>

</body>

</html>
