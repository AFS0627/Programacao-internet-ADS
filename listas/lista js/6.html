<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>6.html</title>
</head>

<body>

<h2>Verificador de Palíndromos</h2>

Digite uma palavra:
<input type="text" id="palavra">

<button onclick="verificar()">Verificar</button>

<p id="resultado"></p>

<script>

function verificar(){

let palavra = document.getElementById("palavra").value;
let invertida = "";

for(let i=palavra.length-1;i>=0;i--){
invertida += palavra[i];
}

if(palavra == invertida){
document.getElementById("resultado").innerText = palavra + " é palíndromo.";
}
else{
document.getElementById("resultado").innerText = palavra + " não é palíndromo.";
}

}

</script>

</body>
</html>
