<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display:grid;
            grid-template-areas:
            "header . main"
            "sidebar sidebar sidebar"
            

            ;
            grid-template-rows: 200px 300px;


        }
        #box1{background-color: antiquewhite;
        grid-area: header;}
        #box2{background-color: rgb(100,20,40);
        grid-area: main}
        #box3{background-color: rgb(226,39,86);
        grid-area: sidebar}
        #box4{background-color: rgb(20,23,100);}
        #box5{background-color: rgb(41,100,20);}
        #box6{background-color: rgb(100,20,75);}
        #box7{background-color: rgb(229,252,13);}
        #box8{background-color: rgb(216,31,157);}
        #box9{background-color: rgb(254,5,38);}

    </style>
</head>
<body>
    <div class="container">
        <div class="box" id="box1">box1</div>
        <div class="box" id="box2">box2</div>
        <div class="box" id="box3">box3</div>
        <div class="box" id="box4">box4</div>
        <div class="box" id="box5">box5</div>
        <div class="box" id="box6">box6</div>
        <div class="box" id="box7">box7</div>
        <div class="box" id="box8">box8</div>
        <div class="box" id="box9">box9</div>
    </div>
</body>
</html>
