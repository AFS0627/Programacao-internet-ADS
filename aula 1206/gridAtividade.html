<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display:grid;
            grid-template-areas:
            "header header header"
            "main      .   sidebar"
            "footer footer footer"
            

            ;
            grid-template-rows: 150px 150px 150px;
            grid-template-columns: 300px;


        }
        #box1{background-color: antiquewhite;
        grid-area: header;}
        #box2{background-color: rgb(100,20,40);
        grid-area: main}
        #box3{background-color: rgb(226,39,86);
        grid-area: sidebar}
        #box4{background-color: rgb(20,23,100);
        grid-area: footer;}
        .box{border-radius: 5%;}
    

    </style>
</head>
<body>
    <div class="container">
        <div class="box" id="box1">box1</div>
        <div class="box" id="box2">box2</div>
        <p>empty</p>
        <div class="box" id="box3">box3</div>
        <div class="box" id="box4">box4</div>
    </div>
    
</body>
</html>
